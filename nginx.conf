server {
    listen 80;
    server_name _;

    # onetimesuite.com is the front door to the same catalog that lives at
    # advancedmarketing.co/software/ — proxied transparently (not redirected)
    # so visitors never leave this domain. The real content/build lives in
    # the advancedmarketing-main repo; this app has no content of its own.
    #
    # Three cases:
    #   1. /software/*                 -> pass straight through, unprefixed
    #   2. known agency pages + assets -> pass straight through to site root
    #   3. everything else (the        -> prefix with /software/, and rewrite
    #      actual product/hub pages)      internal /software/ links back to
    #                                     root-relative so nav stays on this domain

    location ^~ /software/ {
        proxy_pass https://advancedmarketing.co;
        proxy_set_header Host advancedmarketing.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location ~ ^/(css|logo\.png|logo\.webp|favicon\.ico|manifest\.json|about|services|team|case-studies|case-study|portfolio|pay|privacy-policy|terms-of-service|tv|roadshow|ecommerce-blueprint)(/.*)?$ {
        proxy_pass https://advancedmarketing.co$request_uri;
        proxy_set_header Host advancedmarketing.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location / {
        proxy_pass https://advancedmarketing.co/software$request_uri;
        proxy_set_header Host advancedmarketing.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;

        sub_filter_types text/html;
        sub_filter 'href="/software/' 'href="/';
        sub_filter_once off;
    }
}
