server {
    listen 80;
    server_name onetimesuite.com www.onetimesuite.com _;

    root /usr/share/nginx/html;
    index index.html;

    # ClipDeck was rebranded to Bloom Recorder
    location ~ ^/clipdeck(/.*)?$ { return 301 /bloomrecorder/; }

    # clean URLs: /doortracker/ -> /doortracker/index.html
    location / {
        try_files $uri $uri/index.html =404;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;

    location /assets/ {
        add_header Cache-Control "public, max-age=604800";
    }
    location /css/ {
        add_header Cache-Control "public, max-age=86400";
    }
    # central ad server: embeddable from any demo site
    location /ads/ {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=300";
    }
}

# Product subdomains: pdfsmith.onetimesuite.com serves /pdfsmith/index.html.
# Exact-match server_names above (apex, www) win over this regex, and the
# first block stays the default server for direct-IP/healthcheck requests,
# so only real product subdomains land here. Unknown subdomains 404.
server {
    listen 80;
    server_name ~^(?<sub>[a-z0-9-]+)\.onetimesuite\.com$;

    root /usr/share/nginx/html;
    index index.html;

    if ($sub = "clipdeck") { return 301 https://bloomrecorder.onetimesuite.com$request_uri; }

    location = / {
        try_files /$sub/index.html =404;
    }

    # everything else (assets, /comparison/, other pages) mirrors the main site
    location / {
        try_files $uri $uri/index.html =404;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;

    location /assets/ {
        add_header Cache-Control "public, max-age=604800";
    }
    location /css/ {
        add_header Cache-Control "public, max-age=86400";
    }
    # central ad server: embeddable from any demo site
    location /ads/ {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=300";
    }
}
